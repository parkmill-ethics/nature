<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환경 윤리 판별 알고리즘 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .step-indicator { transition: all 0.3s ease; }
        .active-step { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
    <!-- 상단 프로그레스 바 -->
    <div class="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center">
        <div class="flex gap-2">
            <div id="step-1-indicator" class="step-indicator w-10 h-10 rounded-full flex items-center justify-center font-bold active-step">1</div>
            <div id="step-2-indicator" class="step-indicator w-10 h-10 rounded-full flex items-center justify-center font-bold bg-slate-200 text-slate-500">2</div>
            <div id="step-3-indicator" class="step-indicator w-10 h-10 rounded-full flex items-center justify-center font-bold bg-slate-200 text-slate-500">3</div>
        </div>
        <div class="text-right">
            <h1 class="text-xl font-bold text-slate-800">환경 윤리 판별기</h1>
            <p id="step-desc" class="text-sm text-slate-500">대상을 선택하세요</p>
        </div>
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <div id="content-box" class="p-8 min-h-[450px]">
        <!-- JS에서 단계별로 렌더링됨 -->
    </div>

    <!-- 하단 내비게이션 -->
    <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
        <button id="prev-btn" onclick="goPrev()" class="px-6 py-2 rounded-xl font-bold text-slate-400 hover:text-slate-600 transition-colors hidden">이전으로</button>
        <div id="selection-status" class="text-sm font-medium text-slate-400">대상을 선택해주세요</div>
        <button id="next-btn" onclick="goNext()" class="px-6 py-2 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-700 transition-all opacity-50 cursor-not-allowed" disabled>다음 단계로</button>
    </div>
</div>

<script>
    const entities = {
        human: { name: '인간', icon: '👤', reason: true, sentience: true, life: true, ecosystem: true },
        cat: { name: '고양이', icon: '🐈', reason: false, sentience: true, life: true, ecosystem: true },
        flower: { name: '꽃', icon: '🌸', reason: false, sentience: false, life: true, ecosystem: true },
        stone: { name: '돌', icon: '🪨', reason: false, sentience: false, life: false, ecosystem: true }
    };

    let currentStep = 1;
    let selectedEntity = null;
    let revealedPhilosophies = new Set();
    let currentResultHTML = null;

    function updateUI() {
        const contentBox = document.getElementById('content-box');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const stepDesc = document.getElementById('step-desc');
        const status = document.getElementById('selection-status');

        for(let i=1; i<=3; i++) {
            const el = document.getElementById(`step-${i}-indicator`);
            el.className = `step-indicator w-10 h-10 rounded-full flex items-center justify-center font-bold ${i === currentStep ? 'active-step' : (i < currentStep ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-500')}`;
        }

        if (currentStep === 1) {
            stepDesc.innerText = "대상 개체를 선택하세요";
            prevBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            renderStep1(contentBox);
        } else if (currentStep === 2) {
            stepDesc.innerText = "개체의 특징 분석";
            prevBtn.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
            renderStep2(contentBox);
        } else if (currentStep === 3) {
            stepDesc.innerText = "사상적 관점 판별 적용";
            prevBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            renderStep3(contentBox);
        }

        if (selectedEntity) {
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            status.innerText = `선택됨: ${entities[selectedEntity].name}`;
            status.classList.add('text-slate-800');
        } else {
            nextBtn.disabled = true;
            nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
            status.innerText = `대상을 선택해주세요`;
            status.classList.remove('text-slate-800');
        }
    }

    function renderStep1(container) {
        container.innerHTML = `
            <div class="fade-in">
                <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">탐구할 대상을 선택하세요</h2>
                <div class="grid grid-cols-2 gap-4">
                    ${Object.entries(entities).map(([key, item]) => `
                        <button onclick="selectItem('${key}')" class="p-6 rounded-2xl border-4 transition-all flex flex-col items-center gap-2 ${selectedEntity === key ? 'border-slate-800 bg-slate-50' : 'border-slate-100 hover:border-slate-300'}">
                            <span class="text-5xl">${item.icon}</span>
                            <span class="font-bold text-lg">${item.name}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function renderStep2(container) {
        const entity = entities[selectedEntity];
        container.innerHTML = `
            <div class="fade-in">
                <div class="flex flex-col items-center justify-center mb-8">
                    <span class="text-5xl mb-4">${entity.icon}</span>
                    <h2 class="text-2xl font-bold text-slate-800 text-center">${entity.name}의 특징</h2>
                </div>
                <div class="space-y-4 max-w-md mx-auto">
                    ${renderVariableRow("자아의식 및 이성적 사고", entity.reason)}
                    ${renderVariableRow("쾌고 감수 능력 (고통)", entity.sentience)}
                    ${renderVariableRow("생명력 (목적론적 삶)", entity.life)}
                    ${renderVariableRow("생태계 구성 요소", entity.ecosystem)}
                </div>
                <p class="mt-8 text-center text-slate-500 text-sm italic">추출된 특징을 바탕으로 다음 단계에서 도덕적 지위를 판별함.</p>
            </div>
        `;
    }

    function renderVariableRow(label, value) {
        return `
            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                <span class="font-medium text-slate-700">${label}</span>
                <span class="font-black text-xl ${value ? 'text-green-500' : 'text-red-500'}">${value ? 'O' : 'X'}</span>
            </div>
        `;
    }

    function renderStep3(container) {
        const entity = entities[selectedEntity];
        container.innerHTML = `
            <div class="fade-in">
                <h2 class="text-xl font-bold mb-6 text-center text-slate-800 leading-tight">
                    다음의 사상에서 <span class="text-slate-900 border-b-2 border-slate-400">${entity.name}</span>은 도덕적 고려 대상이 될까?
                </h2>
                <div class="grid grid-cols-1 gap-3">
                    ${renderPhilosophyBtn('anthropo', '인간중심주의 (이성 강조)', entity.reason)}
                    ${renderPhilosophyBtn('animal', '동물중심주의 (고통 강조)', entity.sentience)}
                    ${renderPhilosophyBtn('bio', '생명중심주의 (생명력 강조)', entity.life)}
                    ${renderPhilosophyBtn('eco', '생태중심주의 (전체론 강조)', entity.ecosystem)}
                </div>
                <div id="philosophy-result" class="mt-6 p-6 rounded-2xl bg-slate-800 text-white min-h-[120px] flex items-center justify-center text-center shadow-lg">
                    ${currentResultHTML || '<p class="text-slate-400">사상 버튼을 클릭하여 결과를 확인하세요.</p>'}
                </div>
                <div class="mt-8 flex justify-center">
                    <button onclick="resetGame()" class="flex items-center gap-2 px-6 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition-all">
                        <span>🔄</span> 맨 처음으로
                    </button>
                </div>
            </div>
        `;
    }

    function renderPhilosophyBtn(id, label, approved) {
        const isRevealed = revealedPhilosophies.has(id);
        return `
            <button onclick="revealResult('${id}', ${approved})" class="w-full p-4 rounded-xl border-2 transition-all flex justify-between items-center ${isRevealed ? (approved ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50') : 'border-slate-200 hover:bg-slate-50'}">
                <span class="font-bold ${isRevealed ? (approved ? 'text-green-700' : 'text-red-700') : 'text-slate-700'}">${label}</span>
                <span class="text-sm font-bold px-3 py-1 rounded-full ${isRevealed ? (approved ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700') : 'bg-slate-100 text-slate-400'}">
                    ${isRevealed ? (approved ? '대상 포함' : '대상 제외') : '결과 확인'}
                </span>
            </button>
        `;
    }

    function selectItem(key) {
        selectedEntity = key;
        revealedPhilosophies.clear();
        currentResultHTML = null;
        updateUI();
    }

    function goNext() {
        if (currentStep < 3) {
            currentStep++;
            updateUI();
        }
    }

    function goPrev() {
        if (currentStep > 1) {
            currentStep--;
            updateUI();
        }
    }

    function resetGame() {
        currentStep = 1;
        selectedEntity = null;
        revealedPhilosophies.clear();
        currentResultHTML = null;
        updateUI();
    }

    function revealResult(id, approved) {
        revealedPhilosophies.add(id);
        const entity = entities[selectedEntity];
        
        let msg = "";
        if (id === 'anthropo') {
            msg = approved 
                ? `인간은 '자아의식 및 이성적 사고' 능력을 갖춘 자율적 존재이므로 도덕적 고려의 직접적 대상이 됨.` 
                : `${entity.name}은 이성적 능력이 결여되어 있으므로 도덕적 고려의 직접적 대상에서 제외되며, 인간에 대한 간접적 의무의 대상으로만 간주됨.`;
        } else if (id === 'animal') {
            msg = approved 
                ? `'쾌고 감수 능력'을 지닌 ${entity.name}은 고통을 피하고 쾌락을 추구할 권리가 있으므로 이익 평등 고려의 원칙에 따라 보호 대상에 포함됨.` 
                : `${entity.name}은 고통을 느낄 수 있는 감각 기관이 없으므로 동물중심주의 관점에서는 도덕적 고려의 직접적 대상이 아님.`;
        } else if (id === 'bio') {
            msg = approved 
                ? `생명력을 가진 모든 존재는 그 자체로 '목적론적 삶의 중심'이며 내재적 가치를 지니기 때문에 ${entity.name}은 도덕적 고려 대상임.` 
                : `${entity.name}은 생명 활동을 하지 않는 무생물이므로 생명중심주의의 직접적 권리 보호 대상에서 제외됨.`;
        } else if (id === 'eco') {
            msg = `생태중심주의는 개별 생명체를 넘어 생태계 전체의 온전함과 안정을 중시함. 따라서 생태계 구성원인 ${entity.name}은 대지 공동체의 일부로서 보호 대상에 포함됨.`;
        }

        currentResultHTML = `
            <div class="fade-in">
                <p class="text-sm text-slate-400 mb-1 font-bold uppercase tracking-tighter">판별 알고리즘 결과</p>
                <p class="text-lg font-bold ${approved ? 'text-green-400' : 'text-red-400'} mb-2">
                    ${entity.name} : ${approved ? '도덕적 고려 대상 포함' : '도덕적 고려 대상 제외'}
                </p>
                <p class="text-sm leading-relaxed">${msg}</p>
            </div>
        `;
        
        renderStep3(document.getElementById('content-box'));
    }

    updateUI();
</script>

</body>
</html>
